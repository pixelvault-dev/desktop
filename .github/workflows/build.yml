name: build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Needed for tauri-action to create a Release on tag builds.
permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest # universal (Apple Silicon + Intel)
            args: "--target universal-apple-darwin"
            rust-targets: "aarch64-apple-darwin,x86_64-apple-darwin"
          - platform: ubuntu-22.04
            args: ""
            rust-targets: ""
    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            xdg-utils

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - run: npm ci

      # Builds the app on both platforms. On a `v*` tag it also creates/updates a
      # draft GitHub Release with the bundles attached.
      - name: Build (and release on tags)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # ── Apple code signing + notarization (macOS) ──
          # DISABLED until you flip it on. To enable a signed + notarized .dmg:
          #   1. Add the repository variable  APPLE_SIGNING_ENABLED = true
          #      (Settings → Secrets and variables → Actions → Variables)
          #   2. Add the six APPLE_* repository secrets:
          #      APPLE_CERTIFICATE            base64 of the Developer ID .p12
          #      APPLE_CERTIFICATE_PASSWORD   the .p12 export password
          #      APPLE_SIGNING_IDENTITY       "Developer ID Application: Name (TEAMID)"
          #      APPLE_ID                     your Apple ID email
          #      APPLE_PASSWORD               an app-specific password (for notarization)
          #      APPLE_TEAM_ID                your 10-char Team ID
          # Until the variable is 'true' these resolve to empty and tauri-action
          # builds UNSIGNED exactly as today (no behavior change).
          APPLE_CERTIFICATE: ${{ vars.APPLE_SIGNING_ENABLED == 'true' && secrets.APPLE_CERTIFICATE || '' }}
          APPLE_CERTIFICATE_PASSWORD: ${{ vars.APPLE_SIGNING_ENABLED == 'true' && secrets.APPLE_CERTIFICATE_PASSWORD || '' }}
          APPLE_SIGNING_IDENTITY: ${{ vars.APPLE_SIGNING_ENABLED == 'true' && secrets.APPLE_SIGNING_IDENTITY || '' }}
          APPLE_ID: ${{ vars.APPLE_SIGNING_ENABLED == 'true' && secrets.APPLE_ID || '' }}
          APPLE_PASSWORD: ${{ vars.APPLE_SIGNING_ENABLED == 'true' && secrets.APPLE_PASSWORD || '' }}
          APPLE_TEAM_ID: ${{ vars.APPLE_SIGNING_ENABLED == 'true' && secrets.APPLE_TEAM_ID || '' }}
        with:
          args: ${{ matrix.args }}
          tagName: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || '' }}
          releaseName: ${{ startsWith(github.ref, 'refs/tags/v') && format('PixelVault Desktop {0}', github.ref_name) || '' }}
          releaseBody: "Download a bundle below. Binaries are unsigned — on macOS, right-click the app → Open to bypass Gatekeeper."
          releaseDraft: true
          prerelease: false

      # For non-tag runs (push/PR), upload the bundles as workflow artifacts so
      # they're downloadable from the run without cutting a release.
      - name: Upload bundles as artifacts
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        uses: actions/upload-artifact@v4
        with:
          name: pixelvault-desktop-${{ matrix.platform }}
          path: |
            src-tauri/target/**/release/bundle/**/*.dmg
            src-tauri/target/**/release/bundle/**/*.app
            src-tauri/target/**/release/bundle/**/*.deb
            src-tauri/target/**/release/bundle/**/*.AppImage
          if-no-files-found: warn
